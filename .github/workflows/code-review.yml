# Codex Code Review Request Workflow
# Part of the Codex Workflow System - Base Layer
#
# This workflow flags pull requests for local Codex review and posts a
# standardized review checklist for maintainers.

name: Codex Code Review Request

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to mark for review'
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  request-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Get PR details
        id: pr-details
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Post Codex review request
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr-details.outputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const marker = '<!-- codex-review-request -->';
            const body = [
              marker,
              'Codex review requested for this pull request.',
              '',
              'Recommended local follow-up:',
              '- Open the repository in Codex.',
              '- Run `workflow-review-code` on the current changes or on this PR context.',
              '- Prioritize behavior regressions, security issues, missing tests, and documentation drift.',
              '',
              `Suggested prompt: "Use workflow-review-code on PR #${prNumber} and summarize the highest-severity findings first."`
            ].join('\n');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['codex-review-requested']
            });

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              }
            );

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
